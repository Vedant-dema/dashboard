[tool.black]
line-length = 100
target-version = ["py311", "py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.venv
  | \.uv-cache
  | alembic/versions
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", ".uv-cache", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]
