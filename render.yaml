services:
  - type: web
    name: dema-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "0"
      - key: CUSTOMERS_STORE_MODE
        value: db
      - key: DATABASE_URL
        fromDatabase:
          name: dema-postgres
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: /opt/render/project/src/backend/storage

databases:
  - name: dema-postgres
    databaseName: dema
    user: dema
